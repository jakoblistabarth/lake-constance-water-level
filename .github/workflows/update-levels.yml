name: Update Levels Parquet

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight UTC
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write

jobs:
  update-levels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: DuckDB setup
        uses: opt-nc/setup-duckdb-action@v1.2.9
        with:
          version: "v1.5.3"

      - name: Run update script
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -f update-levels.sql ]; then echo 'update-levels.sql missing' && exit 1; fi
          # Run SQL which reads/writes levels.parquet in-place
          duckdb < update-levels.sql
          echo 'update-levels.sql executed'

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          if [ -f levels.parquet ]; then cp levels.parquet public/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
    permissions:
      actions: write

  deploy:
    needs: update-levels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
