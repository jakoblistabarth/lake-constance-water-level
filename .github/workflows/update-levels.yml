name: Update Levels Parquet

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight UTC
  workflow_dispatch: {}

jobs:
  update-levels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: DuckDB setup
        uses: opt-nc/setup-duckdb-action@v1.2.9

      - name: Run update script
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -f update-levels.sql ]; then echo 'update-levels.sql missing' && exit 1; fi
          # Run SQL which reads/writes levels.parquet in-place
          duckdb < update-levels.sql
          echo 'update-levels.sql executed'

      - name: Commit and push updated parquet to branch
        working-directory: ${{ github.workspace }}
        env:
          TARGET_BRANCH: parquet-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

            git add levels.parquet
            if git diff --staged --quiet; then
              echo "No changes to levels.parquet"
            else
              git commit -m "Update levels.parquet [bot]"
              git push origin HEAD:${TARGET_BRANCH}
              echo "Pushed updated levels.parquet to branch ${TARGET_BRANCH}"
            fi
